<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>JPAX | Busy rebuilding</title>
    <meta name="description" content="Busy rebuilding. Stay tuned">
    <meta property="og:type" content="website">
    <meta property="og:title" content="JPAX | Busy rebuilding">
    <meta property="og:description" content="Busy rebuilding. Stay tuned">
    <meta property="og:image" content="https://jpaxmedia.com/jpaxmedialogoOFFICIALFINALwhite.png">
    <meta property="og:url" content="https://jpaxmedia.com">
    <link rel="icon" type="image/png" href="/jpaxmedialogoOFFICIALFINALwhite.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&amp;family=IBM+Plex+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --dark: #06080F;
            --green: #4ADE80;
            --green2: #10B981;
            --border: #1E2A3D;
            --text: #E2E8F0;
            --text-soft: #94A3B8;
            --white: #F8FAFC;
            --font-display: "Chakra Petch", system-ui, sans-serif;
            --font-body: "IBM Plex Sans", system-ui, sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-width: 320px;
            overflow: hidden;
            background: var(--dark);
            color: var(--text);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        .rebuild-page {
            position: relative;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(24px, 5vw, 56px);
            isolation: isolate;
            background:
                radial-gradient(circle at 50% 42%, rgba(74, 222, 128, 0.13), transparent 0 28%),
                radial-gradient(circle at 50% 58%, rgba(16, 185, 129, 0.08), transparent 0 34%),
                linear-gradient(180deg, rgba(6, 8, 15, 0.94), rgba(6, 8, 15, 0.98)),
                var(--dark);
        }

        .rebuild-page::before,
        .rebuild-page::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .rebuild-page::before {
            opacity: 0.58;
            background-image:
                linear-gradient(rgba(74, 222, 128, 0.105) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 222, 128, 0.105) 1px, transparent 1px),
                linear-gradient(rgba(226, 232, 240, 0.026) 1px, transparent 1px),
                linear-gradient(90deg, rgba(226, 232, 240, 0.026) 1px, transparent 1px);
            background-size: 68px 68px, 68px 68px, 272px 272px, 272px 272px;
            mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.95), transparent 74%);
        }

        .rebuild-page::after {
            inset: -12%;
            opacity: 0.38;
            background-image:
                radial-gradient(circle, rgba(248, 250, 252, 0.52) 0 1px, transparent 1.5px),
                radial-gradient(circle, rgba(74, 222, 128, 0.5) 0 1px, transparent 1.7px);
            background-size: 170px 94px, 260px 148px;
            background-position: 0 0, 70px 42px;
            animation: specDrift 28s linear infinite;
        }

        .space-vignette {
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(circle at center, transparent 0 32%, rgba(6, 8, 15, 0.58) 72%, rgba(6, 8, 15, 0.96) 100%),
                linear-gradient(180deg, rgba(6, 8, 15, 0.08), rgba(6, 8, 15, 0.72));
        }

        .content {
            width: min(760px, 100%);
            padding-block: 18px;
            text-align: center;
        }

        .logo {
            width: clamp(132px, 18vw, 188px);
            height: auto;
            margin: 0 auto clamp(20px, 3.8vw, 30px);
            filter: drop-shadow(0 0 24px rgba(74, 222, 128, 0.28));
        }

        h1 {
            margin: 0;
            color: var(--white);
            font-family: var(--font-display);
            font-size: clamp(2rem, 5.2vw, 4.35rem);
            font-weight: 700;
            line-height: 1.04;
            letter-spacing: 0;
            max-width: 100%;
            text-wrap: balance;
        }

        h1 span {
            display: block;
        }

        .accent-line {
            width: min(146px, 36vw);
            height: 2px;
            margin: clamp(22px, 4vw, 34px) auto 0;
            background: linear-gradient(90deg, transparent, var(--green), var(--green2), transparent);
            box-shadow: 0 0 28px rgba(74, 222, 128, 0.42);
        }

        @keyframes specDrift {
            from {
                transform: translate3d(-4%, -2%, 0);
            }
            to {
                transform: translate3d(4%, 2%, 0);
            }
        }

        @media (max-width: 640px) {
            .rebuild-page {
                padding: 26px;
            }

            .logo {
                width: clamp(128px, 42vw, 154px);
                margin-bottom: 22px;
            }

            h1 {
                font-size: clamp(1.78rem, 8vw, 2.15rem);
                line-height: 1.08;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .rebuild-page::after {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div class="rebuild-page" role="main" aria-label="JPAX site rebuilding notice">
        <div class="space-vignette" aria-hidden="true"></div>
        <div class="content">
            <img class="logo" src="/jpaxmedialogoOFFICIALFINAL(whitewithtext).png" alt="JPAX">
            <h1><span>Busy rebuilding.</span><span>Stay tuned</span></h1>
            <div class="accent-line" aria-hidden="true"></div>
        </div>
    </div>
  <script src="/assets/js/jpax-site-intelligence.js" defer></script>
</body>
</html>
