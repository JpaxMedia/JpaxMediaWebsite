    <style>
        :root {
            --bg: #06080F;
            --accent: #4ADE80;
            --accent-glow: rgba(74, 222, 128, 0.15);
            --purple: #8B5CF6;
            --purple-glow: rgba(139, 92, 246, 0.12);
            --white: #F1F5F9;
            --gray-400: #94A3B8;
            --gray-500: #64748B;
            --font-display: 'Chakra Petch', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background-image:
                linear-gradient(rgba(74, 222, 128, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 222, 128, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .glow-orb--green {
            width: 500px; height: 500px;
            background: var(--accent-glow);
            top: -10%; right: -5%;
            animation-delay: 0s;
        }

        .glow-orb--purple {
            width: 400px; height: 400px;
            background: var(--purple-glow);
            bottom: -10%; left: -5%;
            animation-delay: -4s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3rem;
            animation: logoIn 1s ease-out both;
        }

        .logo-wrap svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 0 30px rgba(74, 222, 128, 0.3));
        }

        @keyframes logoIn {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--purple));
            margin: 0 auto 2.5rem;
            border-radius: 2px;
            animation: dividerIn 1s ease-out 0.3s both;
        }

        @keyframes dividerIn {
            from { opacity: 0; width: 0; }
            to { opacity: 1; width: 60px; }
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 600;
            letter-spacing: 0.02em;
            line-height: 1.3;
            margin-bottom: 1rem;
            animation: textIn 1s ease-out 0.5s both;
        }

        .highlight {
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            color: var(--gray-400);
            line-height: 1.7;
            font-weight: 300;
            animation: textIn 1s ease-out 0.7s both;
        }

        @keyframes textIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
            50% { opacity: 0.6; box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
        }

        @media (max-width: 480px) {
            .logo-wrap svg { width: 60px; height: 60px; }
            .logo-wrap { margin-bottom: 2rem; }
            .divider { margin-bottom: 2rem; }
        }
    </style>
</head>
