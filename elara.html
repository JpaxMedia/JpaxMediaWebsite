<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>JPax | Busy rebuilding</title>
    <meta name="description" content="Busy rebuilding. Stay tuned">
    <meta property="og:type" content="website">
    <meta property="og:title" content="JPax | Busy rebuilding">
    <meta property="og:description" content="Busy rebuilding. Stay tuned">
    <meta property="og:image" content="https://jpaxmedia.com/jpaxmedialogoOFFICIALFINALwhite.png">
    <meta property="og:url" content="https://jpaxmedia.com">
    <link rel="icon" type="image/png" href="/jpaxmedialogoOFFICIALFINALwhite.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&amp;family=IBM+Plex+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --dark: #06080F;
            --green: #4ADE80;
            --green2: #10B981;
            --border: #1E2A3D;
            --text: #E2E8F0;
            --text-soft: #94A3B8;
            --white: #F8FAFC;
            --font-display: "Chakra Petch", system-ui, sans-serif;
            --font-body: "IBM Plex Sans", system-ui, sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-width: 320px;
            overflow: hidden;
            background: var(--dark);
            color: var(--text);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        .rebuild-page {
            position: relative;
            min-height: 100svh;
            display: grid;
            place-items: center;
            padding: clamp(28px, 7vw, 72px);
            isolation: isolate;
            background:
                linear-gradient(rgba(6, 8, 15, 0.72), rgba(6, 8, 15, 0.92)),
                url("/spacebackground.jpg") center / cover no-repeat,
                var(--dark);
        }

        .rebuild-page::before,
        .rebuild-page::after {
            content: "";
            position: absolute;
            inset: -20%;
            z-index: -1;
            pointer-events: none;
            background-repeat: repeat;
            transform: rotate(-8deg);
        }

        .rebuild-page::before {
            opacity: 0.82;
            background-image:
                radial-gradient(circle, rgba(248, 250, 252, 0.92) 0 1px, transparent 1.6px),
                radial-gradient(circle, rgba(74, 222, 128, 0.72) 0 1px, transparent 1.8px);
            background-size: 86px 86px, 142px 142px;
            background-position: 0 0, 38px 44px;
            animation: starDrift 36s linear infinite;
        }

        .rebuild-page::after {
            opacity: 0.48;
            background-image:
                radial-gradient(circle, rgba(226, 232, 240, 0.92) 0 1px, transparent 1.5px),
                radial-gradient(circle, rgba(148, 163, 184, 0.5) 0 1px, transparent 1.6px);
            background-size: 52px 52px, 118px 118px;
            background-position: 18px 12px, 64px 70px;
            animation: starDrift 58s linear infinite reverse, twinkle 4.8s ease-in-out infinite;
        }

        .space-vignette {
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(circle at center, transparent 0 28%, rgba(6, 8, 15, 0.52) 64%, rgba(6, 8, 15, 0.94) 100%),
                linear-gradient(180deg, rgba(6, 8, 15, 0.18), rgba(6, 8, 15, 0.82));
        }

        .content {
            width: min(680px, 100%);
            text-align: center;
        }

        .logo {
            width: min(245px, 68vw);
            height: auto;
            margin: 0 auto clamp(34px, 7vw, 54px);
            filter: drop-shadow(0 0 24px rgba(74, 222, 128, 0.28));
        }

        h1 {
            margin: 0;
            color: var(--white);
            font-family: var(--font-display);
            font-size: clamp(2.15rem, 8vw, 5.8rem);
            font-weight: 700;
            line-height: 0.98;
            letter-spacing: 0;
            text-wrap: balance;
        }

        .accent-line {
            width: min(168px, 42vw);
            height: 2px;
            margin: clamp(30px, 5vw, 42px) auto 0;
            background: linear-gradient(90deg, transparent, var(--green), var(--green2), transparent);
            box-shadow: 0 0 28px rgba(74, 222, 128, 0.42);
        }

        @keyframes starDrift {
            from {
                background-position: 0 0, 38px 44px;
            }
            to {
                background-position: 240px 180px, 278px 224px;
            }
        }

        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.34;
            }
            50% {
                opacity: 0.66;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .rebuild-page::before,
            .rebuild-page::after {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div class="rebuild-page" role="main" aria-label="JPax site rebuilding notice">
        <div class="space-vignette" aria-hidden="true"></div>
        <div class="content">
            <img class="logo" src="/jpaxmedialogoOFFICIALFINAL(whitewithtext).png" alt="JPax">
            <h1>Busy rebuilding. Stay tuned</h1>
            <div class="accent-line" aria-hidden="true"></div>
        </div>
    </div>
</body>
</html>
